<div class="empty-state">

  <!-- Illustration -->
  <!-- <img 
    [ngSrc]="illustrationSrc()" 
    width="160" 
    height="160" 
    alt="" 
    class="empty-state-illustration" 
  /> -->

  <!-- Title -->
  <h3 class="empty-state-title">{{ title() }}</h3>

  <!-- Description -->
  @if (description()) {
    <p class="empty-state-description">{{ description() }}</p>
  }

  <!-- Action Button -->
  @if (actionLabel()) {
    <button 
      type="button" 
      class="btn-fayed btn-blue empty-state-action" 
      (click)="actionClick.emit()"
    >
      {{ actionLabel() }}
    </button>
  }

</div>
