<div class="smart-search-container">
  <div class="smart-search-card">

    <!-- Descriptive Text -->
    <p class="search-description">
     البحث الذكي بالذكاء الاصطناعي يفهم لغتك الطبيعية
    </p>

    <!-- Main Search Row -->
    <div class="search-row">
      <div class="search-input-wrapper">
        <input type="text" class="smart-search-input"
          placeholder="مثال: محتاج 5 طن بقايا بلاستيك PET قريب من القاهرة بأقل من ٨٠ ألف جنيه ..."
          [value]="searchQuery()" (input)="onInputChange($event)" (keydown)="onKeyDown($event)" aria-label="بحث ذكي" />
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8" />
          <path d="M21 21l-4.35-4.35" />
        </svg>
      </div>
      <button type="button" class="btn-smart-search" (click)="onSmartSearch()">
        بحث ذكي
      </button>
    </div>

    <!-- Suggestions -->
    <div class="suggestions">
      <span class="suggestions-label">اقتراحات:</span>
      <div class="suggestion-chips">
        @for (suggestion of suggestions; track suggestion) {
        <span class="chip" (click)="useSuggestion(suggestion)">{{ suggestion }}</span>
        }
      </div>
    </div>

  </div>
</div>
