<div class="card h-100 product-card border-0 shadow-sm overflow-hidden d-flex flex-column"
  [class.flex-row-reverse]="viewMode() === 'list'" [class.align-items-stretch]="viewMode() === 'list'">

  <div class="position-relative img-container flex-shrink-0" [style.height]="viewMode() === 'grid' ? '220px' : '100%'"
    [style.width]="viewMode() === 'list' ? '35%' : '100%'">

    <img [ngSrc]="listing().thumbnailUrl" [alt]="listing().title" fill class="object-fit-cover" ngOptimizedImage />

    <span class="badge product-badge">
      {{ listing().materialTag }}
    </span>
  </div>

  <div class="card-body d-flex flex-column p-4 flex-grow-1">
    <h5 class="card-title fw-bold mb-3 text-dark line-clamp-2">
      {{ listing().title }}
    </h5>

    <div class="meta-text mb-1">
      الكمية: <span class="fw-bold text-dark">{{ listing().quantity }} {{ listing().unit }}</span>
    </div>
    <div class="meta-text mb-3">
      المحافظة: <span class="fw-bold text-dark">{{ listing().governorate }}</span>
    </div>

    <div class="price-text mb-1">
      {{ listing().price }} <span class="price-unit">ج.م / {{ listing().unit }}</span>
    </div>

    <div class="posted-text mb-3">
      {{ listing().postedAgo }}
    </div>

    <button class="btn product-btn-outline w-100 mt-auto" (click)="onViewDetails()">
      عرض التفاصيل
    </button>
  </div>

</div>
