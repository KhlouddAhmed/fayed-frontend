<!-- NOTIFICATION DROPDOWN PANEL -->

<div class="notif-panel" dir="rtl">

  <!-- HEADER -->
  <header class="notif-panel-header">
    <h3 class="notif-panel-title">الإشعارات</h3>
    <button 
      type="button" 
      class="notif-panel-close" 
      (click)="closePanel.emit()" 
      aria-label="إغلاق"
    >
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M18 6 6 18M6 6l12 12"/>
      </svg>
    </button>
  </header>

  <!-- NOTIFICATIONS LIST -->
  <ul class="notif-panel-list">
    @for (item of notifications(); track item.id) {
      <li class="notif-item" [class.notif-item--unread]="item.isUnread">
        
        <!-- Icon -->
        <div class="notif-item-icon-wrapper">
          <img
            [src]="'assets/icons/notifications/' + item.type + '.svg'"
            [alt]="item.title"
            width="24"
            height="24"
          />
        </div>

        <!-- Content -->
        <div class="notif-item-content">
          <div class="notif-item-header">
            <p class="notif-item-title">{{ item.title }}</p>
            
            @if (item.isUnread) {
              <span class="notif-item-dot"></span>
            }
          </div>
          
          <p class="notif-item-body">{{ item.body }}</p>
          <span class="notif-item-time">{{ item.timeAgo }}</span>
        </div>

      </li>
    }
  </ul>

  <!-- FOOTER -->
  <footer class="notif-panel-footer">
    <a 
      routerLink="/dashboard/company/notifications" 
      class="notif-panel-view-all" 
      (click)="closePanel.emit()"
    >
      عرض كل الإشعارات
    </a>
  </footer>

</div>
