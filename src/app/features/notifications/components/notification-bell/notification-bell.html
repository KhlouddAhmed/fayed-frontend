<!-- NOTIFICATION BELL WRAPPER -->
<div class="notification-bell-wrapper">

  <!-- BELL BUTTON -->
  <button
    type="button"
    class="notification-bell-btn"
    (click)="toggle()"
    [attr.aria-expanded]="isOpen()"
    aria-label="الإشعارات"
  >
    <!-- Bell Icon -->
    <svg 
      width="22" 
      height="22" 
      viewBox="0 0 24 24" 
      fill="none" 
      stroke="currentColor" 
      stroke-width="2" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    >
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>

    <!-- Unread Count Badge -->
    @if (unreadCount() > 0) {
      <span class="notification-bell-badge">{{ unreadCount() }}</span>
    }
  </button>


  <!-- NOTIFICATION DROPDOWN PANEL -->
  @if (isOpen()) {
    <app-notification-dropdown-panel (closePanel)="isOpen.set(false)" />
  }

</div>
