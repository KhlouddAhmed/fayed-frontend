<div class="overview-page" dir="rtl">

  @if (isLoading()) {
  <div class="overview-page-greeting-skeleton">
    <app-loading-skeleton variant="text" [rows]="2" />
  </div>
  <app-loading-skeleton variant="cards" [rows]="4" />
  <div class="overview-page-lower-grid">
    <app-loading-skeleton variant="feed" [rows]="4" />
    <app-loading-skeleton variant="table" [rows]="5" />
  </div>

  } @else if (isError()) {
  <app-error-state message="تعذر تحميل بيانات لوحة التحكم، حاول مرة أخرى" (retry)="ngOnInit()" />

  } @else if (summaryData()) {

  @let summary = summaryData()!;

  <div class="overview-page-top-row">
    <header class="overview-page-greeting">
      <h1 class="overview-page-greeting-title">مرحباً، {{ summary.companyName }}</h1>
      <p class="overview-page-greeting-subtitle">نظرة شاملة على أداء حسابك</p>
      <p class="overview-page-greeting-date">
        التاريخ الحالي {{ currentDate | date: 'h:mma, yyyy MMMM d' }}
      </p>
    </header>
    <app-ai-promo-card (startConversation)="onStartConversation()" />
  </div>

  <div class="overview-page-stats-grid">
    <app-company-stat-card icon="disputes" label="النزاعات المفتوحة" [value]="summary.openDisputesCount" unit="نزاع جديد"
      accent="red" [badgeText]="summary.requiresUrgentAction ? 'تحتاج اجراء عاجل' : null" linkText="اضغط لعرضها"
      (linkClicked)="onNavigate('disputes')" />
    <app-company-stat-card icon="messages" label="رسائل جديدة" [value]="summary.newMessagesCount" unit="رسائل" accent="blue"
      linkText="اضغط لقراءتها" (linkClicked)="onNavigate('messages')" />
    <app-company-stat-card icon="offers" label="عروض جديدة" [value]="summary.newOffersCount" unit="عرض" accent="green"
      linkText="اضغط لعرضها" (linkClicked)="onNavigate('offers')" />
    <app-company-stat-card icon="alerts" label="تنبيهات ذكية" [value]="summary.smartAlertsCount" unit="تنبيه" accent="yellow"
      linkText="اضغط لعرضها" (linkClicked)="onNavigate('alerts')" />
  </div>

  <div class="overview-page-lower-grid">
    <app-recent-orders-table [orders]="summary.recentOrders" />
    <app-recent-activity-feed [activities]="activitiesData()" />
  </div>

  <section class="overview-page-quick-actions" aria-label="اختصارات سريعة">
    <h2 class="overview-page-quick-actions-title">اختصارات سريعة</h2>
    <div class="overview-page-quick-actions-grid">
      <button type="button" class="quick-action-btn">
        <img src="assets/icons/dashboard/add.svg" alt="" width="24" height="24" />
        إضافة خامة
      </button>
      <button type="button" class="quick-action-btn">
        <img src="assets/icons/dashboard/search.svg" alt="" width="24" height="24" />
        البحث عن خامات
      </button>
      <button type="button" class="quick-action-btn">
        <img src="/assets/icons/dashboard/orders.svg" alt="" width="24" height="24" />
        طلباتي
      </button>
      <button type="button" class="quick-action-btn">
        <img src="/assets/icons/dashboard/message.svg" alt="" width="24" height="24" />
        الرسائل
      </button>
    </div>
  </section>

  }

</div>
