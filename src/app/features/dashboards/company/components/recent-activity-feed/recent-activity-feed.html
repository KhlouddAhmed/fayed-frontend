<section class="activity-feed">
  <div class="activity-feed-header">
    <h2 class="activity-feed-title">آخر النشاطات</h2>
    <a href="#" class="activity-feed-view-all">عرض الكل</a>
  </div>

  <ul class="activity-feed-list">
    @for (item of activities(); track item.id) {
      <li class="activity-feed-item">
        <span class="activity-dot"></span>
        
        <div class="activity-body">
          <p class="activity-title">{{ item.titleKey }}</p>
          <p class="activity-desc">{{ item.descriptionKey }} {{ item.relatedEntityCode }}</p>
        </div>
        
        <span class="activity-time">{{ item.occurredAt | relativeTime }}</span>
      </li>
    }
  </ul>
</section>
