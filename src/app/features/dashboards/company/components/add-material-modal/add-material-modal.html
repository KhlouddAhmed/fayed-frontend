<div class="add-material-modal" role="dialog" aria-modal="true" aria-labelledby="add-material-modal-title">

  <header class="add-material-modal-header">
    <h2 id="add-material-modal-title" class="add-material-modal-title">
      {{ isEditMode() ? 'تعديل خامة' : 'اضافة خامة جديدة' }}
    </h2>
    <button type="button" class="add-material-modal-close-btn" (click)="cancel.emit()" aria-label="إغلاق">
      <img src="assets/icons/dashboard/close.svg" alt="" width="42" height="42" />
    </button>
  </header>

  <div class="add-material-modal-body">

    <form class="add-material-modal-form" (submit)="onSubmit(); $event.preventDefault()">

      <section class="form-section">
        <h3 class="form-section-title">معلومات الخامة الأساسية</h3>

        <div class="form-row-2" style="margin-block-end: 16px;">
          <label class="add-material-modal-field">
            <span>اسم الخامة</span>
            <input type="text" [value]="formValue().name"
              (input)="updateField('name', $any($event.target).value)"
              placeholder="مثال: PET معاد تدويره شفاف" />
          </label>

          <!-- Category dropdown from API -->
          <label class="add-material-modal-field">
            <span>تصنيف الخامة</span>
            <select [value]="formValue().categoryId"
              (change)="updateField('categoryId', $any($event.target).value)">
              <option value="0" disabled>اختر التصنيف</option>
              @for (cat of categories(); track cat.id) {
                <option [value]="cat.id">{{ cat.name }}</option>
              }
            </select>
          </label>
        </div>

        <div class="form-row-2" style="margin-block-end: 16px;">
          <label class="add-material-modal-field">
            <span>نوع الخامة</span>
            <select [value]="formValue().materialType"
              (change)="updateField('materialType', $any($event.target).value)">
              <option value="" disabled>مثال: معاد تدوير (Recycled)</option>
              <option value="recycled">معاد تدوير (Recycled)</option>
              <option value="surplus">فائض إنتاج (Surplus)</option>
              <option value="byproduct">مخلفات تصنيع (By-product)</option>
              <option value="virgin">خام أصلي (Virgin)</option>
            </select>
          </label>

          <label class="add-material-modal-field">
            <span>حالة الخامة</span>
            <select [value]="formValue().condition"
              (change)="updateField('condition', $any($event.target).value)">
              <option value="" disabled>مثال: ممتاز</option>
              <option value="excellent">ممتاز</option>
              <option value="good">جيد</option>
              <option value="fair">مقبول</option>
            </select>
          </label>
        </div>

        <label class="add-material-modal-field">
          <span>وصف الخامة</span>
          <div class="textarea-wrapper">
            <textarea rows="4" [value]="formValue().description"
              (input)="updateField('description', $any($event.target).value)"
              placeholder="مثال: حبيبات PET معاد تدويرها عالية الجودة..."
              maxlength="500"></textarea>
            <span class="char-count">{{ formValue().description.length }}/500</span>
          </div>
        </label>
      </section>

      <section class="form-section">
        <h3 class="form-section-title">الكمية والسعر</h3>

        <div class="form-row-2" style="margin-block-end: 16px; align-items: end;">
          <label class="add-material-modal-field">
            <span>الكمية المتاحة</span>
            <div class="form-row-3" style="gap: 8px;">
              <input type="number" min="0" [value]="formValue().availableQuantity"
                (input)="updateField('availableQuantity', $any($event.target).value)"
                placeholder="مثال: 30" style="grid-column: 1 / 3;" />
              <div class="unit-badge">طن</div>
            </div>
          </label>

          <label class="add-material-modal-field">
            <span>اقل كمية للبيع</span>
            <div class="form-row-3" style="gap: 8px;">
              <input type="number" min="0" [value]="formValue().minOrderQuantity"
                (input)="updateField('minOrderQuantity', $any($event.target).value)"
                placeholder="مثال: 5" style="grid-column: 1 / 3;" />
              <div class="unit-badge">طن</div>
            </div>
          </label>
        </div>

        <label class="add-material-modal-field">
          <span>نطاق السعر (ج.م / طن)</span>
          <div style="display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center;">
            <input type="number" min="0" [value]="formValue().pricePerUnit"
              (input)="updateField('pricePerUnit', $any($event.target).value)" placeholder="من" />
            <span class="range-separator" style="padding-block-start: 0;">الى</span>
            <input type="number" min="0" [value]="formValue().maxPricePerUnit"
              (input)="updateField('maxPricePerUnit', $any($event.target).value)" placeholder="الي" />
          </div>
        </label>
      </section>

    </form>

    <aside class="add-material-modal-sidebar">
      <div>
        <h3 class="sidebar-section-title">الصور والفيديو</h3>

        <p style="font-size: 0.8125rem; color: var(--text-soft); margin: 0 0 10px 0; text-align: right;">صور المادة</p>
        <div class="upload-zone" role="button" tabindex="0" aria-label="رفع صور المادة"
          (click)="imageInput.click()" (keydown.enter)="imageInput.click()">
          <input #imageInput type="file" accept="image/png,image/jpeg" multiple style="display:none"
            (change)="onImagesSelected($any($event.target).files)" />
          <span class="upload-zone-icon"><i class="lucide-image"></i></span>
          <span class="upload-zone-label">اضغط لرفع الصور</span>
          <span class="upload-zone-hint">PNG, JPG حتى 5MB</span>
        </div>

        <p style="font-size: 0.8125rem; color: var(--text-soft); margin: 16px 0 10px 0; text-align: right;">فيديو المادة</p>
        <div class="upload-zone" role="button" tabindex="0" aria-label="رفع فيديو المادة"
          (click)="videoInput.click()" (keydown.enter)="videoInput.click()">
          <input #videoInput type="file" accept="video/*" style="display:none"
            (change)="onVideoSelected($any($event.target).files)" />
          <span class="upload-zone-icon"><i class="lucide-video"></i></span>
          <span class="upload-zone-label">اضغط لرفع الفيديو</span>
          <span class="upload-zone-hint">MP4, MOV حتى 50MB</span>
        </div>

        <p style="font-size: 0.8125rem; color: var(--text-soft); margin: 16px 0 10px 0; text-align: right;">رفع شهادة التحليل</p>
        <div class="upload-zone" role="button" tabindex="0" aria-label="رفع شهادة التحليل"
          (click)="docInput.click()" (keydown.enter)="docInput.click()">
          <input #docInput type="file" accept=".pdf,.doc,.docx,image/png,image/jpeg" style="display:none"
            (change)="onDocSelected($any($event.target).files)" />
          <span class="upload-zone-icon"><i class="lucide-file-text"></i></span>
          <span class="upload-zone-label">اضغط لرفع المستند</span>
          <span class="upload-zone-hint">PDF, PNG, JPG حتى 5MB</span>
        </div>
      </div>

      <footer class="add-material-modal-footer" style="padding: 0; border: none; margin-block-start: 4px;">
        <button type="submit" class="btn-fayed btn-blue" [disabled]="isSubmitting() || !isFormValid()"
          (click)="onSubmit()">
          {{ isSubmitting() ? 'جاري الحفظ...' : 'حفظ' }}
        </button>
        <button type="button" class="btn-fayed btn-white" (click)="cancel.emit()">
          الغاء
        </button>
      </footer>
    </aside>

  </div>

</div>
