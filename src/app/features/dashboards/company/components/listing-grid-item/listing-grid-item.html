<article class="listing-card">
  <div class="listing-card-image-placeholder" aria-hidden="true">
    <i class="lucide-image"></i>
  </div>

  <app-status-badge
    class="listing-card-status"
    [statusMap]="statusMap"
    [status]="material().status"
  />

  <h3 class="listing-card-name">{{ material().name }}</h3>

  <div class="listing-card-meta">
    <span>{{ material().availableQuantity }} {{ material().unit }}</span>
    <span class="listing-card-price">
      {{ material().pricePerUnit }} ج.م /{{ material().unit }}
    </span>
  </div>

  <button
    type="button"
    class="btn-fayed btn-white listing-card-details-btn"
    (click)="onViewDetailsClick()"
  >
    عرض تفاصيل الخامة
  </button>
</article>
