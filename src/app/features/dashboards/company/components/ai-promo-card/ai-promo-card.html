<section class="ai-promo-card" aria-labelledby="ai-promo-title">
  <img
    ngSrc="/assets/images/ai/ai-assistant-bot.svg"
    width="64"
    height="64"
    alt=""
    class="ai-promo-card-illustration"
  />

  <div class="ai-promo-card-content">
    <h2 id="ai-promo-title" class="ai-promo-card-title">
      مساعدك الذكي جاهز لمساعدتك
    </h2>
    <p class="ai-promo-card-subtitle">
      اسأل أي شيء عن حسابك، مبيعاتك، أو طلباتك
    </p>

    <button
      type="button"
      class="btn-fayed btn-blue ai-promo-card-cta"
      (click)="onStartConversationClick()"
    >
      <i class="lucide-sparkles" aria-hidden="true"></i>
      ابدأ محادثة جديدة
    </button>
  </div>
</section>
