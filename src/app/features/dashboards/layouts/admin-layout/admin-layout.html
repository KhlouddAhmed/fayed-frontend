      <h3 class="text-white fw-bold mb-0" style="font-size: 24px;">فايض</h3>
    </a>

  
    <nav class="sidebar-nav mt-2">
      <ul class="nav flex-column mb-0">
        <li class="nav-item">
          <a routerLink="/admin/overview" routerLinkActive="active" class="nav-link custom-nav-link py-3 px-4">الرئيسية</a>
        </li>
        <li class="nav-item">
          <a routerLink="/admin/kyb" routerLinkActive="active" class="nav-link custom-nav-link py-3 px-4">التحقق من الهوية</a>
        </li>
        <li class="nav-item">
          <a routerLink="/admin/moderation" routerLinkActive="active" class="nav-link custom-nav-link py-3 px-4">إدارة الاعلانات</a>
        </li>
        <li class="nav-item">
          <a routerLink="/admin/orders" routerLinkActive="active" class="nav-link custom-nav-link py-3 px-4">الطلبات والمدفوعات</a>
        </li>
        <li class="nav-item">
          <a routerLink="/admin/disputes" routerLinkActive="active" class="nav-link custom-nav-link py-3 px-4">إدارة النزاعات</a>
        </li>
        <li class="nav-item">
          <a routerLink="/admin/users" routerLinkActive="active" class="nav-link custom-nav-link py-3 px-4">إدارة المستخدمين</a>
        </li>
        <li class="nav-item">
          <a routerLink="/admin/analytics" routerLinkActive="active" class="nav-link custom-nav-link py-3 px-4">التحليلات والتقريرات</a>
        </li>
        <li class="nav-item">
          <a routerLink="/admin/settings" routerLinkActive="active" class="nav-link custom-nav-link py-3 px-4">إعدادات المنصة</a>
        </li>
      </ul>
    </nav>
  </aside>

  
  <div class="main-content d-flex flex-column bg-light-gray">
    
  
    <header class="topbar bg-white px-4 d-flex align-items-center justify-content-between shadow-sm z-1">
      
  
      <div class="search-box position-relative" style="width: 400px;">
        <input type="text" class="form-control rounded-pill bg-light border-0 py-2 pe-4" placeholder="البحث عن شركات، طلبات، نزاعات..." style="font-size: 13px;">
        <i class="bi bi-search position-absolute top-50 translate-middle-y text-muted" style="left: 15px;"></i> <!-- الأيقونة على اليسار في الـ RTL -->
      </div>

    
      <div class="d-flex align-items-center gap-4">
        <button class="btn btn-link text-primary p-0">
          <i class="bi bi-bell fs-5"></i>
        </button>

        <div class="d-flex align-items-center gap-3">
          <div class="text-end">
            <h6 class="mb-0 fw-bold text-navy" style="font-size: 14px;">{{ currentUser().name }}</h6>
            <small class="text-muted" style="font-size: 12px;">{{ currentUser().role }}</small>
          </div>
        
          <img [src]="currentUser().avatarUrl" alt="User Avatar" class="rounded-circle" width="45" height="45" style="object-fit: cover;">
        </div>
      </div>
    </header>

    
    <main class="page-wrapper p-4 overflow-y-auto">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
