    <!-- Navigation -->
    <nav class="sidebar-nav mt-2">
      <ul class="nav flex-column mb-0">
        @for (item of navItems; track item.route) {
          <li class="nav-item">
            <a [routerLink]="item.route"
               routerLinkActive="active"
               (click)="isSidebarOpen.set(false)"
               class="nav-link custom-nav-link py-3 px-4 d-flex align-items-center gap-2">
              <i [class]="item.icon + ' fs-6'"></i>
              <span>{{ item.label }}</span>
            </a>
          </li>
        }
      </ul>
    </nav>

    <!-- Logout -->
    <div class="sidebar-logout">
      <button type="button" class="logout-btn" (click)="openLogoutModal()">
        <i class="bi bi-box-arrow-right fs-6" style="transform: scaleX(-1);"></i>
        تسجيل الخروج
      </button>
    </div>

  </aside>

  <!-- Main Content -->
  <div class="main-content bg-light-gray">

    <header class="topbar bg-white px-4 d-flex align-items-center justify-content-between shadow-sm z-1">

      <button class="border-0 bg-transparent p-0 d-lg-none" (click)="toggleSidebar()">
        <i class="bi bi-list fs-4 text-navy"></i>
      </button>

      <!-- Search -->
      <div class="search-box position-relative" style="width: 400px;">
        <input type="text" class="form-control rounded-pill bg-light border-0 py-2 pe-4"
               placeholder="البحث عن شركات، طلبات، نزاعات..." style="font-size: 13px;">
        <i class="bi bi-search position-absolute top-50 translate-middle-y text-muted" style="left: 15px;"></i>
      </div>

      <!-- User & Notifications -->
      <div class="d-flex align-items-center gap-4">

        <app-notification-bell />

        <div class="d-flex align-items-center gap-3">
          <img [src]="currentUser().avatarUrl" alt="User Avatar"
               class="rounded-circle shadow-sm"
               width="45" height="45"
               style="object-fit: cover;">
          <div class="text-end d-none d-md-block">
            <h6 class="mb-0 fw-bold text-navy" style="font-size: 14px;">{{ currentUser().name }}</h6>
            <small class="text-muted" style="font-size: 12px;">{{ currentUser().role }}</small>
          </div>
        </div>
      </div>
    </header>

    <main class="page-wrapper p-4">
      <router-outlet></router-outlet>
    </main>

  </div>

  <!-- Logout Modal -->
  @if (isLogoutModalOpen()) {
    <div class="modal-overlay">
      <div class="modal-card">
        <h4 class="mb-3">تسجيل الخروج</h4>
        <p class="mb-4 text-muted">هل أنت متأكد أنك ترغب بتسجيل الخروج من لوحة التحكم؟</p>
        <div class="d-flex gap-2 justify-content-end">
          <button class="btn btn-danger" (click)="confirmLogout()">نعم، تسجيل الخروج</button>
          <button class="btn btn-light" (click)="closeLogoutModal()">لا، إلغاء</button>
        </div>
      </div>
    </div>
  }

</div>
