<div class="filters-card">

  <!-- Filters Header -->
  <div class="filters-header">
    <div class="d-flex align-items-center gap-2">
      <img src="assets/icons/market/filter.png" class="filtering-icon" alt="filtering">
      <span class="title">الفلاتر</span>
    </div>

    <button type="button" class="clear-btn" (click)="onClearAll()">مسح الكل</button>
  </div>

  <!-- Filters Form -->
  <form class="filters-form" (submit)="$event.preventDefault(); onSubmit()">

    <!-- Material Type -->
    <div class="form-group">
      <label for="materialType">نوع الخامة</label>
      <select id="materialType" class="form-control" [value]="materialType()" (change)="onMaterialTypeChange($event)">
        <option value="" disabled>اختر نوع الخامة</option>
      </select>
    </div>

    <!-- Governorate -->
    <div class="form-group">
      <label for="governorate">المحافظة</label>
      <select id="governorate" class="form-control" [value]="governorate()" (change)="onGovernorateChange($event)">
        <option value="" disabled>اختر المحافظة</option>
      </select>
    </div>

    <!-- Quantity Range -->
    <div class="form-group">
      <label>الكمية (طن)</label>
      <div class="range-inputs">
        <input type="number" placeholder="من" [value]="quantityFrom()" (input)="onQuantityFromChange($event)" />
        <span>-</span>
        <input type="number" placeholder="إلى" [value]="quantityTo()" (input)="onQuantityToChange($event)" />
      </div>
    </div>

    <!-- Price Range -->
    <div class="form-group">
      <label>نطاق السعر (ج.م / طن)</label>
      <div class="range-inputs">
        <input type="number" placeholder="من" [value]="priceFrom()" (input)="onPriceFromChange($event)" />
        <span>-</span>
        <input type="number" placeholder="إلى" [value]="priceTo()" (input)="onPriceToChange($event)" />
      </div>
    </div>

    <!-- Submit -->
    <button type="submit" class="apply-btn">
      تطبيق الفلاتر
    </button>

  </form>

</div>
