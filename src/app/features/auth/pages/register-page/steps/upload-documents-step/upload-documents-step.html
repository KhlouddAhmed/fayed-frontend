<div class="upload-documents-step">

  <h2 class="form-title">ارفع مستندات شركتك</h2>
  <p class="form-subtitle">نحتاج الي السجل التجاري والبطاقه الضريبية للتحقق من الشركة</p>

  <div class="upload-cards-grid">
    <app-file-upload-card label="البطاقة الضريبية" [acceptedExtensions]="['pdf', 'jpg', 'png']" [maxSizeMb]="10"
      iconType="document" (fileAccepted)="onTaxCardAccepted($event)" (fileRemoved)="onTaxCardRemoved()" />

    <app-file-upload-card label="السجل التجاري" [acceptedExtensions]="['pdf', 'jpg', 'png']" [maxSizeMb]="10"
      iconType="document" (fileAccepted)="onCommercialRegistryAccepted($event)"
      (fileRemoved)="onCommercialRegistryRemoved()" />
  </div>

  <p class="upload-disclaimer">تأكد أن جميع البيانات ظاهرة وبوضوح للقراءة</p>

  <button type="button" class="w-100 btn-primary" [disabled]="!isNextEnabled()" (click)="onNext()">
    التالي
  </button>

  <div class="text-center mt-3">
    <span class="text-muted">هل لديك حساب بالفعل ؟ </span>
    <a routerLink="/auth/login" class="register-link ms-1">تسجيل الدخول</a>
  </div>

</div>
