<div class="identity-verification-step">
  <h2 class="form-title">تأكيد هوية المالك</h2>
  <p class="form-subtitle">نحتاج إلى صور من بطاقة الهوية وصورة لك مع البطاقة للتحقق من هويتك</p>

  <div class="upload-cards-grid">
    <app-file-upload-card
      label="صورة لك وأنت تحمل البطاقة"
      [acceptedExtensions]="['jpg', 'png']"
      [maxSizeMb]="10"
      iconType="upload"
      (fileAccepted)="onSelfieAccepted($event)"
      (fileRemoved)="onSelfieRemoved()"
    />

    <app-file-upload-card
      label="صورة بطاقة الهوية"
      [acceptedExtensions]="['jpg', 'png']"
      [maxSizeMb]="10"
      iconType="upload"
      (fileAccepted)="onIdCardAccepted($event)"
      (fileRemoved)="onIdCardRemoved()"
    />
  </div>

  <p class="upload-disclaimer">تأكد أن جميع البيانات ظاهرة وبوضوح للقراءة</p>

  <button
    type="button"
    class="w-100 btn-primary"
    [disabled]="!isNextEnabled()"
    (click)="onNext()"
  >
    التالي
  </button>
</div>
