<app-register-layout>
  <div class="text-center mb-8">
    <h2 class="text-xl font-bold text-primary-dark mb-2">إنشاء حساب الدخول</h2>
    <p class="text-slate text-xs">أكمل بياناتك لإنشاء حساب لك والبدء في استخدام منصة فايض</p>
  </div>

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-6">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      
      <div class="flex flex-col gap-2">
        <label class="text-[14px] font-semibold text-[#0B0E14] text-right">
          البريد الإلكتروني <span class="text-red-500">*</span>
        </label>
        <input 
          type="email" 
          formControlName="email"
          placeholder="أدخل بريد الإلكتروني الرسمي"
          class="w-full px-4 py-3 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all bg-white"
          [class.border-red-500]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched"
        >
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-[14px] font-semibold text-[#0B0E14] text-right">
          رقم الهاتف <span class="text-red-500">*</span>
        </label>
        
        <div 
          class="flex w-full border rounded-lg overflow-hidden transition-all bg-white focus-within:ring-2 focus-within:ring-primary/20 focus-within:border-primary"
          [class.border-red-500]="registerForm.get('phoneNumber')?.invalid && registerForm.get('phoneNumber')?.touched"
          [class.border-gray-200]="!(registerForm.get('phoneNumber')?.invalid && registerForm.get('phoneNumber')?.touched)"
        >
          <input 
            type="tel" 
            formControlName="phoneNumber"
            placeholder="أدخل رقم الهاتف"
            class="flex-1 px-4 py-3 text-sm text-right bg-transparent outline-none border-none shadow-none focus:ring-0"
          >
          <div class="flex items-center px-4 bg-gray-50 border-r border-gray-200 text-slate text-sm font-medium" dir="ltr">
            +20
          </div>
        </div>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-[14px] font-semibold text-[#0B0E14] text-right">
          كلمة المرور <span class="text-red-500">*</span>
        </label>
        <input 
          type="password" 
          formControlName="password"
          placeholder="أدخل كلمة المرور"
          class="w-full px-4 py-3 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all bg-white"
          [class.border-red-500]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched"
        >
        <span class="text-[11px] font-normal text-[#B2BBC6] text-right block mt-1">
          يجب أن تكون كلمة المرور 8 أحرف على الأقل وتحتوي على حرف كبير ورقم
        </span>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-[14px] font-semibold text-[#0B0E14] text-right">
          تأكيد كلمة المرور <span class="text-red-500">*</span>
        </label>
        <input 
          type="password" 
          formControlName="confirmPassword"
          placeholder="تأكيد كلمة المرور"
          class="w-full px-4 py-3 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all bg-white"
          [class.border-red-500]="(registerForm.get('confirmPassword')?.invalid || registerForm.hasError('passwordMismatch')) && registerForm.get('confirmPassword')?.touched"
        >
      </div>

    </div>

    <div class="pt-6">
      <button 
        type="submit" 
        [disabled]="registerForm.invalid"
        class="w-full py-4 rounded-lg font-bold text-white transition-colors disabled:bg-[#B1BBC6] bg-primary hover:bg-primary-dark disabled:cursor-not-allowed"
      >
        التالي
      </button>
    </div>
  </form>
</app-register-layout>
